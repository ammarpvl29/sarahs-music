<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sarah 🌙</title>
    <style>
        :root {
            --bg-color: #1A1525;
            --surface-color: #271F36;
            --text-main: #DCD5E7;
            --accent: #A38599;
            --hover-color: #877B9E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden; /* Prevent scrolling from floating images */
        }

        /* --- New: Subtle Background Image Layer --- */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .floating-photo {
            position: absolute;
            border-radius: 20px;
            opacity: 0.05; /* Barely visible */
            filter: blur(6px) grayscale(30%); /* Softens edges to prevent harsh contrast */
            /* 120s animation cycle to prevent motion sickness */
            animation: drift 120s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(3vw, 4vh) scale(1.05); }
        }
        /* ------------------------------------------ */

        .container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
            z-index: 1; /* Keep above background */
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-weight: 400;
            margin-bottom: 10px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        p.message {
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
            opacity: 0.85;
        }

        .player-controls {
            margin: 20px 0;
        }

        button {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.5s ease;
        }

        button:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .playlist {
            list-style: none;
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Subtle scrollbar */
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .playlist li {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.4s ease, color 0.4s ease;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .playlist li:hover, .playlist li.active {
            background-color: var(--hover-color);
            color: var(--bg-color);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div id="background-canvas"></div>

    <!-- UI Layer -->
    <div class="container">
        <h1>For Sarah 🌙</h1>
        <p class="message">
            Close your eyes, breathe slowly, and let the noise fade away.
        </p>

        <audio id="audio-player" src=""></audio>

        <div class="player-controls">
            <h3 id="current-track" style="margin-bottom: 15px; font-weight: normal;">Select a song</h3>
            <button id="play-pause-btn">Play</button>
        </div>

        <ul class="playlist" id="playlist">
            <!-- Playlist generated by JavaScript -->
        </ul>
    </div>

    <script>
        // ==========================================
        // 1. DATA CONFIGURATION (Edit this section!)
        // ==========================================
        const appData = {
            songs: [
                { title: "Cariño", file: "carino.mp3" },
                { title: "Ruthless", file: "ruthless.mp3" },
                { title: "Over the Moon", file: "over_the_moon.mp3" }
                // To add a new song, just add a new line here.
            ],
            photos: [
                "photo1.jpg",
                "photo2.jpg",
                "photo3.jpg"
                // Add new photo filenames here.
            ]
        };

        // ==========================================
        // 2. CORE APPLICATION LOGIC
        // ==========================================
        
        // Initialize Background Photos
        const bgCanvas = document.getElementById('background-canvas');
        appData.photos.forEach((photoSrc, index) => {
            const img = document.createElement('img');
            img.src = photoSrc;
            img.className = 'floating-photo';
            
            // Randomize position and animation delay for a natural feel
            img.style.top = Math.floor(Math.random() * 60) + 'vh';
            img.style.left = Math.floor(Math.random() * 60) + 'vw';
            img.style.width = Math.floor(Math.random() * 200 + 300) + 'px'; // 300-500px width
            img.style.animationDelay = (index * -30) + 's'; // Stagger animations
            
            bgCanvas.appendChild(img);
        });

        // Initialize Playlist
        const playlistContainer = document.getElementById('playlist');
        const audio = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const trackTitle = document.getElementById('current-track');
        let isPlaying = false;

        // Build DOM elements from data
        appData.songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.textContent = song.title;
            li.dataset.src = song.file;
            li.dataset.index = index;
            playlistContainer.appendChild(li);

            li.addEventListener('click', function() {
                loadTrack(this);
                audio.play();
                isPlaying = true;
                playPauseBtn.textContent = 'Pause';
            });
        });

        const trackElements = document.querySelectorAll('.playlist li');

        function loadTrack(element) {
            trackElements.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            trackTitle.textContent = element.textContent;
            audio.src = element.dataset.src;
        }

        // Play/Pause Button Logic
        playPauseBtn.addEventListener('click', () => {
            if (!audio.src || audio.src === window.location.href) {
                loadTrack(trackElements[0]);
            }
            
            if (isPlaying) {
                audio.pause();
                playPauseBtn.textContent = 'Play';
            } else {
                audio.play();
                playPauseBtn.textContent = 'Pause';
            }
            isPlaying = !isPlaying;
        });

        // Auto-play next
        audio.addEventListener('ended', () => {
            let current = document.querySelector('.playlist li.active');
            let nextIndex = parseInt(current.dataset.index) + 1;
            
            if (nextIndex < trackElements.length) {
                loadTrack(trackElements[nextIndex]);
                audio.play();
            } else {
                isPlaying = false;
                playPauseBtn.textContent = 'Play';
                trackElements.forEach(t => t.classList.remove('active'));
                trackTitle.textContent = "Select a song";
            }
        });
    </script>
</body>
</html>
